<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#2d1b69;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#e8457a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9a56;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fff5e6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd699;stop-opacity:0.8" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="moonGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="400" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="100" cy="40" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="250" cy="70" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="400" cy="30" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="520" cy="80" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="700" cy="50" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="850" cy="25" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="950" cy="65" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="1100" cy="45" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="150" cy="100" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="600" cy="20" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="1050" cy="90" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="110" r="0.8" fill="#fff" opacity="0.3"/>
  <circle cx="780" cy="95" r="0.8" fill="#fff" opacity="0.4"/>

  <!-- Moon -->
  <circle cx="900" cy="100" r="50" fill="url(#moon)" filter="url(#moonGlow)"/>
  <!-- Moon craters (subtle) -->
  <circle cx="885" cy="85" r="8" fill="#f5deb3" opacity="0.2"/>
  <circle cx="915" cy="110" r="5" fill="#f5deb3" opacity="0.15"/>
  <circle cx="895" cy="115" r="3" fill="#f5deb3" opacity="0.1"/>

  <!-- Distant mountain silhouette (Mt Fuji) -->
  <polygon points="0,350 150,220 300,350" fill="#1a0533" opacity="0.6"/>
  <polygon points="350,350 550,180 750,350" fill="#1a0533" opacity="0.5"/>
  <polygon points="700,350 870,200 1040,350" fill="#1a0533" opacity="0.4"/>
  
  <!-- Mt Fuji (prominent) -->
  <polygon points="700,350 850,140 1000,350" fill="#2d1b4e" opacity="0.8"/>
  <polygon points="790,220 850,140 910,220" fill="#e8e8f0" opacity="0.5"/>

  <!-- Torii Gate -->
  <g transform="translate(180, 200)">
    <!-- Main pillars -->
    <rect x="0" y="20" width="14" height="160" fill="#c0392b" rx="2"/>
    <rect x="136" y="20" width="14" height="160" fill="#c0392b" rx="2"/>
    <!-- Top beam (kasagi) -->
    <rect x="-20" y="0" width="190" height="14" fill="#c0392b" rx="3"/>
    <!-- Second beam (nuki) -->
    <rect x="-5" y="35" width="160" height="10" fill="#c0392b" rx="2"/>
    <!-- Small pillar supports -->
    <rect x="30" y="20" width="6" height="25" fill="#c0392b"/>
    <rect x="114" y="20" width="6" height="25" fill="#c0392b"/>
  </g>

  <!-- Ground / water reflection area -->
  <rect x="0" y="350" width="1200" height="50" fill="#1a0533" opacity="0.8"/>
  <!-- Water shimmer -->
  <line x1="50" y1="365" x2="120" y2="365" stroke="#e8457a" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="375" x2="280" y2="375" stroke="#ff9a56" stroke-width="1" opacity="0.2"/>
  <line x1="400" y1="360" x2="500" y2="360" stroke="#e8457a" stroke-width="1" opacity="0.25"/>
  <line x1="600" y1="380" x2="700" y2="380" stroke="#ff9a56" stroke-width="1" opacity="0.2"/>
  <line x1="800" y1="370" x2="900" y2="370" stroke="#ffd699" stroke-width="1" opacity="0.3"/>
  <line x1="1000" y1="365" x2="1100" y2="365" stroke="#e8457a" stroke-width="1" opacity="0.2"/>

  <!-- Cherry blossom tree (left side) -->
  <g transform="translate(60, 160)">
    <!-- Trunk -->
    <path d="M 30,200 Q 25,150 20,100 Q 15,60 30,30 Q 35,60 32,100 Q 28,150 35,200" fill="#4a2c2a" stroke="#3d2322" stroke-width="1"/>
    <!-- Branches -->
    <path d="M 25,80 Q 0,50 -30,40" fill="none" stroke="#4a2c2a" stroke-width="4" stroke-linecap="round"/>
    <path d="M 30,60 Q 55,30 80,20" fill="none" stroke="#4a2c2a" stroke-width="3" stroke-linecap="round"/>
    <path d="M 22,100 Q -10,80 -40,85" fill="none" stroke="#4a2c2a" stroke-width="3" stroke-linecap="round"/>
    <path d="M 33,70 Q 60,55 90,60" fill="none" stroke="#4a2c2a" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Blossoms (pink clusters) -->
    <circle cx="-30" cy="35" r="15" fill="#ffb7c5" opacity="0.8"/>
    <circle cx="-45" cy="45" r="12" fill="#ff9eb5" opacity="0.7"/>
    <circle cx="-15" cy="25" r="10" fill="#ffc8d6" opacity="0.8"/>
    <circle cx="80" cy="15" r="14" fill="#ffb7c5" opacity="0.8"/>
    <circle cx="95" cy="25" r="11" fill="#ff9eb5" opacity="0.7"/>
    <circle cx="70" cy="25" r="9" fill="#ffc8d6" opacity="0.8"/>
    <circle cx="-40" cy="80" r="13" fill="#ffb7c5" opacity="0.7"/>
    <circle cx="-55" cy="90" r="10" fill="#ff9eb5" opacity="0.6"/>
    <circle cx="90" cy="55" r="12" fill="#ffb7c5" opacity="0.7"/>
    <circle cx="100" cy="65" r="9" fill="#ffc8d6" opacity="0.7"/>
    <circle cx="30" cy="20" r="12" fill="#ffb7c5" opacity="0.6"/>
    <circle cx="45" cy="10" r="8" fill="#ffc8d6" opacity="0.7"/>
  </g>

  <!-- Falling petals -->
  <g filter="url(#glow)">
    <ellipse cx="300" cy="150" rx="4" ry="3" fill="#ffb7c5" opacity="0.7" transform="rotate(30,300,150)"/>
    <ellipse cx="450" cy="200" rx="3" ry="2" fill="#ffc8d6" opacity="0.6" transform="rotate(-20,450,200)"/>
    <ellipse cx="550" cy="170" rx="4" ry="3" fill="#ffb7c5" opacity="0.5" transform="rotate(45,550,170)"/>
    <ellipse cx="380" cy="260" rx="3" ry="2" fill="#ff9eb5" opacity="0.6" transform="rotate(10,380,260)"/>
    <ellipse cx="500" cy="300" rx="4" ry="3" fill="#ffc8d6" opacity="0.5" transform="rotate(-35,500,300)"/>
    <ellipse cx="650" cy="230" rx="3" ry="2" fill="#ffb7c5" opacity="0.4" transform="rotate(60,650,230)"/>
    <ellipse cx="200" cy="280" rx="3" ry="2" fill="#ffc8d6" opacity="0.5" transform="rotate(-15,200,280)"/>
    <ellipse cx="750" cy="180" rx="4" ry="3" fill="#ffb7c5" opacity="0.4" transform="rotate(25,750,180)"/>
    <ellipse cx="420" cy="130" rx="3" ry="2" fill="#ff9eb5" opacity="0.5" transform="rotate(40,420,130)"/>
    <ellipse cx="580" cy="280" rx="3" ry="2" fill="#ffc8d6" opacity="0.4" transform="rotate(-50,580,280)"/>
  </g>

  <!-- Title text -->
  <text x="600" y="195" text-anchor="middle" font-family="'Segoe UI', 'Hiragino Sans', sans-serif" font-size="52" font-weight="bold" fill="#ffffff" filter="url(#glow)">
    台湾 · 東京 · 大阪
  </text>
  <text x="600" y="240" text-anchor="middle" font-family="'Segoe UI', 'Hiragino Sans', sans-serif" font-size="22" fill="#ffc8d6" letter-spacing="3" opacity="0.9">
    TAIWAN · TOKYO · OSAKA — 2026
  </text>
  <text x="600" y="275" text-anchor="middle" font-family="'Segoe UI', 'Hiragino Sans', sans-serif" font-size="16" fill="#ffd699" letter-spacing="2" opacity="0.8">
    🌸 Family Adventure · March 28 – April 4 🌸
  </text>
</svg>
